<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>León Store ULTRA</title><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script><style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
header{text-align:center;padding:20px;border-bottom:2px solid gold}
.productos{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:20px}
.card{background:#1a1a1a;padding:15px;border-radius:10px;text-align:center}
button{padding:10px;border:none;border-radius:6px;background:gold;font-weight:bold}
#carrito{position:fixed;right:0;top:0;width:300px;height:100%;background:#111;padding:15px;overflow:auto}
input{margin:5px;padding:8px;width:90%}
</style></head>
<body><header>
<h1>León Store 🔥</h1>
</header><section id="productos" class="productos"></section><!-- CARRITO --><div id="carrito">
<h2>🛒 Carrito</h2>
<ul id="listaCarrito"></ul>
<h3 id="total"></h3>
<button onclick="checkout()">Finalizar compra</button>
</div><!-- FORM DATOS --><div id="formCompra" style="display:none;padding:20px;">
<h2>Datos de envío</h2>
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">
<button onclick="pagar()">Pagar</button>
</div><script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let carrito = [];

async function render(){
let cont = document.getElementById('productos');
cont.innerHTML='';
let snapshot = await db.collection('productos').get();
snapshot.forEach(doc=>{
let p = doc.data();
cont.innerHTML += `
<div class="card">
<img src="${p.img}" width="100%">
<h3>${p.nombre}</h3>
<p>$${p.precio}</p>
<button onclick="agregarCarrito('${p.nombre}',${p.precio})">Agregar</button>
</div>`;
});
}

function agregarCarrito(nombre,precio){
carrito.push({nombre,precio});
renderCarrito();
}

function renderCarrito(){
let lista = document.getElementById('listaCarrito');
let total = 0;
lista.innerHTML='';
carrito.forEach(p=>{
lista.innerHTML += `<li>${p.nombre} - $${p.precio}</li>`;
total += p.precio;
});
document.getElementById('total').innerText = 'Total: $'+total;
}

function checkout(){
document.getElementById('formCompra').style.display='block';
}

async function pagar(){
let nombre = document.getElementById('nombre').value;
let telefono = document.getElementById('telefono').value;
let direccion = document.getElementById('direccion').value;

let total = carrito.reduce((acc,p)=>acc+p.precio,0);

await db.collection('pedidos').add({carrito,nombre,telefono,direccion,total});

// 🔥 LINK WHATSAPP COMO BACKUP
window.location.href = `https://wa.me/5493425222140?text=Pedido Total:${total}%20Nombre:${nombre}%20Dir:${direccion}`;

// 💰 INTEGRACIÓN MERCADOPAGO (TENÉS QUE CONFIGURAR)
// Paso real:
// 1. Crear cuenta en MercadoPago
// 2. Crear preferencia desde backend (Node.js)
// 3. Redirigir a checkout

alert('Pedido enviado 🔥 (Falta integrar pago automático MercadoPago)');
}

render();
</script></body>
</html>
